<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="City of Rialto Chamber of Commerce Web Site">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Indie+Flower&family=Madimi+One&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Encode+Sans+Expanded:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/normalize.css">
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/larger.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <header>
        <h1>Rialto Chamber of Commerce</h1>
    </header>
    <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Discover</a></li>
            <li class="active"><a href="#">Join</a></li>
            <li><a href="#">Directory</a></li>
        </ul>
    </nav>
    <main>
        <h1>Join our community!</h1>
        <form method="get">
            <fieldset>
                <label>First Name: <input type="text" required="yes" name="first" id="first"></label>
                <label>Last Name: <input type="text" required="yes" name="last" id="last"></label>
                <label>Job Title/Position: <input type="text" name="title" id="title" pattern="[a-zA-Z0-9\s]{7,}" title="Must use a minimum of seven characters"></label>
                <label>E-mail: <input type="email" required="yes" name="email" id="email" placeholder="example@email.com"></label>
                <label>Mobile Phone: <input type="tel" required="yes" name="phone" id="phone"></label>
                <label>Business/Organization Name: <input type="text" required="yes" name="business" id="business"></label>
                <div>Membership Level: </div>
                <label><input type="radio" name="Membership" value="np">NP Membership</label>
                <label><input type="radio" name="Membership" value="bronze">Bronze Membership</label>
                <label><input type="radio" name="Membership" value="silver">Silver Membership</label>
                <label><input type="radio" name="Membership" value="gold">Gold Membership</label>
                <label>Business/Organization Description: <input type="text" name="desc" id="desc"></label>
                <label>Timestamp <input type="hidden" name="time" id="time"></label>
                <input type="submit" value="Join our community!">
            </fieldset>
        </form>
    </main>
    <footer>
        <p>©2024
            Johannes Wendt
            USA
        </p>
        <p2 id="lastModified"></p2>
    </footer>
</body>
</html>
